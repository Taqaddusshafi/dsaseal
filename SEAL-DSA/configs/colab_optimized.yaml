# ============================================================
# SEAL-DSA Colab-Optimized Configuration
# ============================================================
# Aggressive optimizations for Google Colab Free Tier
# T4 GPU (15GB VRAM), 12.7GB RAM, ~12h session limit
# ============================================================

# Inherit from default and override
_base_: "default.yaml"

model:
  name: "Qwen/Qwen2.5-1.5B-Instruct" # Upgraded production-level model
  max_length: 1024 # Increased for complex coding problems
  quantization:
    enabled: true
    bits: 4

lora:
  r: 4 # Lower rank for speed
  lora_alpha: 8
  lora_dropout: 0.1 # Higher dropout for small data

seal:
  num_epochs: 10 # Production training time
  questions_per_topic: 20 # Train on more varied problems
  batch_size: 2 # Keep small for Colab RAM
  gradient_accumulation_steps: 8 # Keep effective batch = 16
  learning_rate: 2.0e-4 # Stable rate over longer training

ewc:
  lambda: 0.3
  fisher_sample_size: 100 # Smaller sample

checkpoint:
  save_every_n_epochs: 1
  save_to_drive: true # Critical for Colab disconnects

hardware:
  max_memory_mb: 12000 # Conservative for free tier
